<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Now — The Confluence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css">
<style>
  .unit-tabs { display:flex; gap:10px; justify-content:center; margin: 24px 0 30px; flex-wrap:wrap; }
  .unit-tabs button {
    background:#fff; border:1px solid #00000018; padding:10px 20px; border-radius:999px;
    font-weight:600; font-size:0.88rem; cursor:pointer; color:var(--ink-soft); font-family:inherit;
  }
  .unit-tabs button.active { background:var(--frame); color:#fff; border-color:var(--frame); }
  .widget-panel { display:none; }
  .widget-panel.active { display:block; }
</style>
</head>
<body data-page="book">

<div id="site-header"></div>

<div class="page-hero">
  <div class="eyebrow">Direct Booking</div>
  <h1>Book Your Stay</h1>
  <p class="sub">Book directly with us — no third-party fees.</p>
</div>

<div class="section">
  <div class="unit-tabs">
    <button data-target="panel-mon" class="active">The Monongahela</button>
    <button data-target="panel-alle">The Allegheny</button>
    <button data-target="panel-point">The Point (Combined)</button>
  </div>

  <!-- ============================================================
       Each panel needs its OWN widget code from Hospitable:
       Direct Bookings -> Website -> Properties -> [that property]
       -> "..." menu -> Copy widget code
       Container must stay at least 320px wide and 900px tall.
  ============================================================= -->

  <div class="widget-panel active" id="panel-mon">
    <div class="widget-frame-wrap">
      <iframe sandbox="allow-top-navigation allow-scripts allow-same-origin"
        style="width:100%; height:900px; border:0;"
        src="https://booking.hospitable.com/widget/REPLACE-WITH-MONONGAHELA-WIDGET-ID/REPLACE-WITH-PROPERTY-ID">
      </iframe>
    </div>
  </div>

  <div class="widget-panel" id="panel-alle">
    <div class="widget-frame-wrap">
      <iframe sandbox="allow-top-navigation allow-scripts allow-same-origin"
        style="width:100%; height:900px; border:0;"
        src="https://booking.hospitable.com/widget/REPLACE-WITH-ALLEGHENY-WIDGET-ID/REPLACE-WITH-PROPERTY-ID">
      </iframe>
    </div>
  </div>

  <div class="widget-panel" id="panel-point">
    <div class="widget-frame-wrap">
      <iframe sandbox="allow-top-navigation allow-scripts allow-same-origin"
        style="width:100%; height:900px; border:0;"
        src="https://booking.hospitable.com/widget/REPLACE-WITH-POINT-WIDGET-ID/REPLACE-WITH-PROPERTY-ID">
      </iframe>
    </div>
  </div>
</div>

<div id="site-footer"></div>
<script src="site.js"></script>
<script>
  (function(){
    var buttons = document.querySelectorAll('.unit-tabs button');
    var panels = document.querySelectorAll('.widget-panel');
    buttons.forEach(function(btn){
      btn.addEventListener('click', function(){
        buttons.forEach(function(b){ b.classList.remove('active'); });
        panels.forEach(function(p){ p.classList.remove('active'); });
        btn.classList.add('active');
        document.getElementById(btn.dataset.target).classList.add('active');
      });
    });
  })();
</script>
</body>
</html>
