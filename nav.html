<header class="site-header">
  <div class="inner">
    <a class="brand" href="home.html">
      <img src="confluence-house.png" alt="The Confluence">
      <span>The Confluence</span>
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <nav class="nav-links" id="navLinks">
      <a href="overview.html" data-page="overview">Overview</a>
      <a href="dogwall.html" data-page="dogwall">The Dog Wall</a>
      <a href="faq.html" data-page="faq">FAQ</a>
      <a href="book.html" data-page="book" class="cta">Book Now</a>
    </nav>
  </div>
</header>
<script>
  (function(){
    var toggle = document.getElementById('navToggle');
    var links = document.getElementById('navLinks');
    if (toggle) toggle.addEventListener('click', function(){ links.classList.toggle('open'); });
    var current = document.body.getAttribute('data-page');
    if (current) {
      var link = links.querySelector('[data-page="' + current + '"]');
      if (link) link.classList.add('active');
    }
  })();
</script>
